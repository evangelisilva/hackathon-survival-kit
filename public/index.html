<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hackathon Survival Kit</title>
    <!-- Pico.css for clean, minimal styling -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <header>
            <hgroup>
                <h1>🛠️ Hackathon Survival Kit</h1>
                <h2>Submit one item you cannot survive a hackathon without</h2>
            </hgroup>
        </header>

        <section id="form-section">
            <article>
                <h3>Add Your Survival Item</h3>
                <form id="survival-form">
                    <div class="grid">
                        <label for="item_name">
                            Item Name
                            <input type="text" id="item_name" name="item_name" placeholder="e.g. Noise-cancelling headphones" required>
                        </label>
                        <label for="category">
                            Category
                            <select id="category" name="category" required>
                                <option value="" disabled selected>Select category...</option>
                                <option value="Drink">Drink</option>
                                <option value="Food">Food</option>
                                <option value="Tech">Tech</option>
                                <option value="Comfort">Comfort</option>
                                <option value="Other">Other</option>
                            </select>
                        </label>
                    </div>

                    <div class="grid">
                        <label for="must_have_level">
                            Must-Have Level (1-10)
                            <input type="number" id="must_have_level" name="must_have_level" min="1" max="10" value="5" required>
                        </label>
                        <label for="survival_reason">
                            Survival Reason
                            <input type="text" id="survival_reason" name="survival_reason" placeholder="Why is this essential?">
                        </label>
                    </div>

                    <button type="submit">Submit Item</button>
                </form>
            </article>
        </section>

        <section id="items-section">
            <article>
                <h3>Current Survival Items</h3>
                <figure>
                    <table role="grid">
                        <thead>
                            <tr>
                                <th>Item</th>
                                <th>Category</th>
                                <th>Level</th>
                                <th>Survival Reason</th>
                            </tr>
                        </thead>
                        <tbody id="items-body">
                            <!-- Items will be loaded here -->
                        </tbody>
                    </table>
                </figure>
            </article>
        </section>

        <footer>
            <article class="qr-container">
                <div id="qrcode"></div>
                <p><small>Scan to open on your phone</small></p>
                <p id="deployed-url" style="display:none;"></p>
            </article>
        </footer>
    </main>

    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
